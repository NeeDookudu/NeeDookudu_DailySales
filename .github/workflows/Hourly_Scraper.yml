name: India Movies Data Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright cryptography requests

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Clean old data and create fresh directory
        # Deletes the old data folder completely to prevent duplicate/stale data
        run: |
          rm -rf data
          mkdir -p data

      - name: Run Scrapers and Merger
        # Passes the SUPER_KEY to your scripts
        env:
          SUPER_KEY: ${{ secrets.SUPER_KEY }}
        run: |
          echo "🚀 Running BMS Scraper..."
          python liverun.py
          
          echo "🚀 Running District Scraper..."
          python LiveDistrictrun.py
          
          echo "🚀 Running Merger..."
          python mergerrun.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the freshly generated data folder
          git add data/
          
          git diff --cached --quiet || git commit -m "Update data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
